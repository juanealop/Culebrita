<!-- Vista del patrón MVVM.
     La Vista SOLO bindea propiedades del ViewModel y llama a sus comandos.
     No contiene lógica, no accede al servicio directamente. -->

<!-- ─── Vista: Historial ──────────────────────────────────────────── -->
@if (esHistorial()) {
  <app-historial (volver)="onVolver()" />
}

<!-- ─── Vista: Juego ─────────────────────────────────────────────── -->
@if (!esHistorial()) {

<div class="min-h-screen bg-gray-100 flex flex-col items-center justify-center gap-6 p-6">

  <!-- Título -->
  <h1 class="text-4xl font-bold text-gray-800 tracking-tight">Culebrita</h1>

  <!-- Panel de información -->
  <div class="flex items-center gap-8">

    <!-- Puntuación — binding al signal puntuacion() del ViewModel -->
    <div class="text-center">
      <p class="text-xs uppercase text-gray-500 font-semibold tracking-widest">Puntuación</p>
      <p class="text-3xl font-bold text-gray-800">{{ puntuacion() }}</p>
    </div>

    <!-- Estado — binding a etiquetaEstado() y claseEstadoBadge() del ViewModel -->
    <div class="text-center">
      <p class="text-xs uppercase text-gray-500 font-semibold tracking-widest">Estado</p>
      <span
        class="inline-block px-3 py-1 rounded-full text-sm font-semibold"
        [ngClass]="claseEstadoBadge()"
      >
        {{ etiquetaEstado() }}
      </span>
    </div>

  </div>

  <!-- Tablero con botón de historial en la esquina superior derecha -->
  <div class="relative">
    <app-tablero [tablero]="tablero()" />
    <!-- Botón historial — esquina superior derecha del tablero -->
    <button
      (click)="onVerHistorial()"
      title="Ver historial de partidas"
      class="absolute top-2 right-2 bg-gray-800/80 hover:bg-gray-700 text-white text-xs font-semibold px-2 py-1 rounded-md transition-colors z-10">
      Historial
    </button>
  </div>

  <!-- Controles — flags booleanos del ViewModel, comandos del ViewModel -->
  <div class="flex gap-3">

    @if (mostrarIniciar()) {
      <button
        (click)="onIniciar()"
        class="px-5 py-2 bg-green-600 hover:bg-green-700 text-white font-semibold rounded-lg transition-colors"
      >
        Iniciar
      </button>
    }

    @if (mostrarPausar()) {
      <button
        (click)="onPausar()"
        class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition-colors"
      >
        Pausar
      </button>
    }

    @if (mostrarReiniciar()) {
      <button
        (click)="onReiniciar()"
        class="px-5 py-2 bg-gray-600 hover:bg-gray-700 text-white font-semibold rounded-lg transition-colors"
      >
        Reiniciar
      </button>
    }

  </div>

 

</div>

<!-- Overlay de Game Over — binding al flag juegoTerminado() del ViewModel -->
@if (juegoTerminado()) {
  <div class="fixed inset-0 bg-black/40 flex items-center justify-center z-10">
    <div class="bg-white rounded-2xl shadow-xl p-8 text-center flex flex-col gap-4">
      <h2 class="text-3xl font-bold text-red-600">Juego Terminado</h2>
      <p class="text-xl text-gray-700">
        Puntuación final: <span class="font-bold">{{ puntuacion() }}</span>
      </p>
      <button
        (click)="onReiniciar()"
        class="px-6 py-3 bg-green-600 hover:bg-green-700 text-white font-semibold rounded-lg transition-colors"
      >
        Jugar de nuevo
      </button>
    </div>
  </div>
}

} <!-- fin @if (!esHistorial()) -->
